<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mythic Creator Wars — MS3 | WarDrum Games</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0a0612;
    --bg2:     #0e0a1a;
    --panel:   #110d20;
    --panel2:  #17112e;
    --border:  #2d1f4e;
    --purple:  #7b2fd4;
    --purple2: #9d50e8;
    --purple3: #4a1080;
    --gold:    #c8a44a;
    --gold2:   #e6c56a;
    --gold3:   #f0d080;
    --red:     #e63946;
    --green:   #2ecc71;
    --blue:    #3a86ff;
    --text:    #ede8f5;
    --muted:   #6b5a8a;
    --glow-p:  rgba(123,47,212,0.4);
    --glow-g:  rgba(200,164,74,0.4);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated bg */
  body::before {
    content:'';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(123,47,212,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(123,47,212,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none; z-index: 0;
  }

  body::after {
    content:'';
    position: fixed;
    top: -300px; left: 50%; transform: translateX(-50%);
    width: 1000px; height: 600px;
    background: radial-gradient(ellipse, rgba(123,47,212,0.12) 0%, rgba(200,164,74,0.05) 50%, transparent 70%);
    pointer-events: none; z-index: 0;
    animation: breathe 6s ease-in-out infinite;
  }

  @keyframes breathe {
    0%,100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
    50%      { opacity: 1;   transform: translateX(-50%) scale(1.1); }
  }

  .wrap { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 20px 60px; }

  /* ── LOADING ── */
  #loading-overlay {
    position: fixed; inset: 0; background: var(--bg); z-index: 999;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
  }

  .spinner {
    width: 50px; height: 50px;
    border: 3px solid var(--border);
    border-top-color: var(--purple);
    border-right-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Rajdhani', sans-serif; font-size: 12px; letter-spacing: 4px;
    color: var(--muted); text-transform: uppercase;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* ── HEADER ── */
  header {
    padding: 36px 0 0; text-align: center; position: relative;
  }

  50%      { transform: translateY(-6px); }
  }

  .logo-label {
    font-family: 'Rajdhani', sans-serif; font-size: 11px; letter-spacing: 6px;
    color: var(--purple2); text-transform: uppercase; margin-bottom: 8px;
  }

  header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(26px, 5.5vw, 54px); font-weight: 900; letter-spacing: 3px;
    background: linear-gradient(135deg, var(--gold3) 0%, var(--gold) 40%, var(--purple2) 70%, var(--gold2) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    line-height: 1.1;
    text-shadow: none;
    filter: drop-shadow(0 0 30px rgba(200,164,74,0.3));
  }

  header h1 span {
    display: block; font-size: clamp(12px, 2vw, 18px); letter-spacing: 10px;
    font-family: 'Rajdhani', sans-serif; font-weight: 600;
    background: linear-gradient(135deg, var(--purple2) 0%, var(--gold) 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    margin-top: 6px;
  }

  .header-line {
    width: 300px; height: 1px; margin: 20px auto 0;
    background: linear-gradient(90deg, transparent, var(--purple), var(--gold), var(--purple), transparent);
    position: relative;
  }

  .header-line::before {
    content: '⚔';
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 14px; color: var(--gold);
    background: var(--bg); padding: 0 10px;
  }

  /* ── ROLE BAR ── */
  .role-bar {
    display: none; justify-content: flex-end; align-items: center; gap: 12px; padding: 16px 0 0;
  }
  .role-bar.visible { display: flex; }

  .role-pill {
    font-family: 'Rajdhani', sans-serif; font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; padding: 6px 16px; border: 1px solid var(--border);
    color: var(--muted); clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  }
  .role-pill.mod     { border-color: var(--purple); color: var(--purple2); background: rgba(123,47,212,0.12); box-shadow: 0 0 12px rgba(123,47,212,0.2); }
  .role-pill.creator { border-color: var(--gold);   color: var(--gold2);   background: rgba(200,164,74,0.10); box-shadow: 0 0 12px rgba(200,164,74,0.2); }

  .db-status { display: flex; align-items: center; gap: 6px; font-family: 'Rajdhani', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .db-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .db-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .db-dot.error { background: var(--red); }

  .signout-btn {
    font-family: 'Rajdhani', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    padding: 6px 16px; border: 1px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; transition: all 0.2s;
    clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  }
  .signout-btn:hover { border-color: var(--red); color: var(--red); background: rgba(230,57,70,0.08); }

  /* ── ROLE SCREEN ── */
  #role-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 55vh; padding: 40px 20px;
  }

  .role-prompt {
    font-family: 'Rajdhani', sans-serif; font-size: 11px; letter-spacing: 5px;
    color: var(--muted); text-transform: uppercase; margin-bottom: 36px; text-align: center;
  }

  .role-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 620px; width: 100%; }

  .role-card {
    background: linear-gradient(135deg, var(--panel) 0%, var(--panel2) 100%);
    border: 1px solid var(--border); padding: 40px 28px; text-align: center;
    cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden;
    clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
  }

  .role-card::before {
    content:''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(123,47,212,0.08), rgba(200,164,74,0.05));
    opacity: 0; transition: opacity 0.3s;
  }

  .role-card::after {
    content:''; position: absolute;
    top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(123,47,212,0.1) 0%, transparent 60%);
    opacity: 0; transition: opacity 0.3s;
  }

  .role-card:hover { border-color: var(--purple); transform: translateY(-4px); box-shadow: 0 8px 30px rgba(123,47,212,0.25), 0 0 0 1px rgba(200,164,74,0.1); }
  .role-card:hover::before, .role-card:hover::after { opacity: 1; }

  .role-card .icon { font-size: 44px; margin-bottom: 16px; filter: drop-shadow(0 0 10px var(--glow-p)); }
  .role-card h3 { font-family: 'Cinzel', serif; font-size: 16px; letter-spacing: 2px; color: var(--gold2); margin-bottom: 10px; }
  .role-card p  { font-size: 12px; color: var(--muted); line-height: 1.7; }

  /* ── PIN OVERLAY ── */
  .pin-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 300; align-items: center; justify-content: center; }
  .pin-overlay.open { display: flex; }

  .pin-box {
    background: linear-gradient(135deg, var(--panel), var(--panel2));
    border: 1px solid var(--purple3); border-top: 2px solid var(--purple2);
    padding: 40px; width: 360px; text-align: center;
    box-shadow: 0 0 60px rgba(123,47,212,0.3);
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
  }

  .pin-box h3 { font-family: 'Cinzel', serif; font-size: 18px; color: var(--purple2); margin-bottom: 6px; }
  .pin-box p  { font-size: 12px; color: var(--muted); margin-bottom: 28px; }

  .pin-input {
    width: 100%; background: var(--bg2); border: 1px solid var(--purple3);
    color: var(--gold2); font-family: 'Orbitron', sans-serif; font-size: 24px;
    text-align: center; padding: 14px; letter-spacing: 10px; outline: none;
    margin-bottom: 16px; transition: all 0.2s;
  }
  .pin-input:focus { border-color: var(--purple2); box-shadow: 0 0 15px rgba(123,47,212,0.3); }
  .pin-input.error-shake { animation: shake 0.3s; border-color: var(--red); }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  .pin-actions { display: flex; gap: 10px; justify-content: center; }
  .pin-error { font-family: 'Rajdhani', sans-serif; font-size: 12px; color: var(--red); letter-spacing: 1px; margin-bottom: 10px; min-height: 18px; }

  /* ── NAV ── */
  nav { display: flex; justify-content: center; gap: 6px; padding: 28px 0 0; }

  nav button {
    font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase; padding: 12px 28px;
    border: 1px solid var(--border); background: var(--panel); color: var(--muted);
    cursor: pointer; transition: all 0.25s;
    clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
    position: relative; overflow: hidden;
  }

  nav button::before {
    content:''; position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--purple3), var(--purple));
    opacity: 0; transition: opacity 0.25s;
  }

  nav button span { position: relative; z-index: 1; }

  nav button.active::before, nav button:hover::before { opacity: 1; }
  nav button.active, nav button:hover { color: #fff; border-color: var(--purple); box-shadow: 0 0 20px rgba(123,47,212,0.4); }

  /* ── STATS ── */
  .stats-bar { display: grid; gap: 14px; margin: 24px 0; }
  .stats-bar.two-col  { grid-template-columns: repeat(2,1fr); }
  .stats-bar.four-col { grid-template-columns: repeat(4,1fr); }

  .stat-card {
    background: linear-gradient(135deg, var(--panel) 0%, var(--panel2) 100%);
    border: 1px solid var(--border); padding: 20px;
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
    text-align: center; position: relative; overflow: hidden; transition: all 0.3s;
  }

  .stat-card::before {
    content:''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--purple3), var(--gold), var(--purple3));
  }

  .stat-card:hover { border-color: var(--purple); box-shadow: 0 4px 20px rgba(123,47,212,0.2); }

  .stat-card .num {
    font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 900;
    background: linear-gradient(135deg, var(--gold2), var(--gold));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }

  .stat-card .lbl {
    font-family: 'Rajdhani', sans-serif; font-size: 10px; letter-spacing: 3px;
    color: var(--muted); text-transform: uppercase; margin-top: 4px;
  }

  /* ── TAB CONTENT ── */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── SEC TITLE ── */
  .sec-title {
    font-family: 'Rajdhani', sans-serif; font-size: 11px; letter-spacing: 5px;
    color: var(--gold); text-transform: uppercase; margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .sec-title::after { content:''; flex:1; height: 1px; background: linear-gradient(90deg, var(--purple3), transparent); }

  /* ── PANEL BOX ── */
  .panel-box {
    background: linear-gradient(135deg, var(--panel) 0%, var(--panel2) 100%);
    border: 1px solid var(--border); padding: 28px; margin-bottom: 24px;
    position: relative; overflow: hidden;
    clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
  }

  .panel-box::before {
    content:''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--purple3), var(--gold), var(--purple2), var(--gold), var(--purple3));
  }

  /* ── FORM ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-grid.full { grid-template-columns: 1fr; }

  .field label {
    display: block; font-family: 'Rajdhani', sans-serif; font-size: 10px;
    letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px;
  }

  .field input, .field select {
    width: 100%; background: var(--bg2); border: 1px solid var(--border);
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px;
    padding: 11px 16px; outline: none; transition: all 0.2s;
  }

  .field input:focus, .field select:focus {
    border-color: var(--purple2); box-shadow: 0 0 12px rgba(123,47,212,0.2);
  }

  .field select option { background: var(--panel2); }

  /* ── CREATOR WELCOME ── */
  .creator-welcome {
    background: linear-gradient(135deg, rgba(123,47,212,0.1), rgba(200,164,74,0.05));
    border: 1px solid rgba(123,47,212,0.3); border-left: 3px solid var(--purple2);
    padding: 20px 24px; margin-bottom: 24px; display: flex; align-items: center; gap: 18px;
    box-shadow: inset 0 0 30px rgba(123,47,212,0.05);
  }
  .creator-welcome .welcome-icon { font-size: 32px; filter: drop-shadow(0 0 8px var(--glow-p)); }
  .creator-welcome h4 { font-family: 'Cinzel', serif; font-size: 15px; color: var(--gold2); margin-bottom: 5px; }
  .creator-welcome p  { font-size: 12px; color: var(--muted); line-height: 1.6; }

  /* ── BUTTONS ── */
  .btn {
    font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase; padding: 14px 36px;
    border: none; cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
  }

  .btn::after {
    content:''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    opacity: 0; transition: opacity 0.2s;
  }

  .btn:hover::after { opacity: 1; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .btn-gold {
    background: linear-gradient(135deg, var(--gold3), var(--gold), #a8782a);
    color: #1a0a00; font-weight: 800;
    box-shadow: 0 4px 20px rgba(200,164,74,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .btn-gold:hover:not(:disabled) {
    box-shadow: 0 6px 30px rgba(200,164,74,0.55), inset 0 1px 0 rgba(255,255,255,0.3);
    transform: translateY(-1px);
  }

  .btn-purple {
    background: linear-gradient(135deg, var(--purple2), var(--purple), var(--purple3));
    color: #fff;
    box-shadow: 0 4px 20px rgba(123,47,212,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .btn-purple:hover:not(:disabled) {
    box-shadow: 0 6px 30px rgba(123,47,212,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
    transform: translateY(-1px);
  }

  .btn-sm { padding: 8px 18px; font-size: 11px; letter-spacing: 2px; clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%); }

  .btn-green {
    background: linear-gradient(135deg, #2ecc71, #1a8f4a);
    color: #000; box-shadow: 0 4px 15px rgba(46,204,113,0.3);
  }
  .btn-green:hover:not(:disabled) { box-shadow: 0 6px 25px rgba(46,204,113,0.5); transform: translateY(-1px); }

  .btn-red {
    background: linear-gradient(135deg, #e63946, #a01020);
    color: #fff; box-shadow: 0 4px 15px rgba(230,57,70,0.3);
  }
  .btn-red:hover:not(:disabled) { box-shadow: 0 6px 25px rgba(230,57,70,0.5); transform: translateY(-1px); }

  .btn-blue {
    background: linear-gradient(135deg, #3a86ff, #1a56cc);
    color: #fff; box-shadow: 0 4px 15px rgba(58,134,255,0.3);
  }
  .btn-blue:hover:not(:disabled) { box-shadow: 0 6px 25px rgba(58,134,255,0.5); transform: translateY(-1px); }

  .btn-ghost {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); clip-path: none; padding: 8px 16px; font-size: 11px;
  }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); background: rgba(200,164,74,0.06); }

  /* ── QUEUE ── */
  .queue-filters { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }

  .filter-btn {
    font-family: 'Rajdhani', sans-serif; font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; padding: 7px 18px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer; transition: all 0.2s;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }
  .filter-btn.active { border-color: var(--purple2); color: var(--purple2); background: rgba(123,47,212,0.1); box-shadow: 0 0 10px rgba(123,47,212,0.2); }

  .search-box {
    margin-left: auto; background: var(--bg2); border: 1px solid var(--border);
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 12px;
    padding: 8px 16px; outline: none; width: 200px; transition: all 0.2s;
  }
  .search-box:focus { border-color: var(--purple2); box-shadow: 0 0 10px rgba(123,47,212,0.2); }

  /* ── SUBMISSION CARD ── */
  .submission-card {
    background: linear-gradient(135deg, var(--panel), var(--panel2));
    border: 1px solid var(--border); border-left: 3px solid var(--border);
    padding: 18px 22px; margin-bottom: 10px;
    display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: center;
    transition: all 0.25s; position: relative; overflow: hidden;
  }
  .submission-card::before { content:''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(123,47,212,0.03), transparent); opacity: 0; transition: opacity 0.25s; }
  .submission-card:hover::before { opacity: 1; }
  .submission-card:hover { border-color: var(--purple); border-left-color: var(--purple2); box-shadow: 0 4px 20px rgba(123,47,212,0.15); }
  .submission-card.approved { border-left-color: var(--green); }
  .submission-card.rejected { border-left-color: var(--red); opacity: 0.55; }
  .submission-card.pending  { border-left-color: var(--gold); }

  .sub-info .creator-name { font-family: 'Rajdhani', sans-serif; font-size: 17px; font-weight: 700; color: var(--text); }
  .sub-info .content-title { font-size: 12px; color: var(--muted); margin: 3px 0 8px; }
  .sub-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  .badge { font-family: 'Rajdhani', sans-serif; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 10px; border: 1px solid; }
  .badge-yt    { color: #ff4444; border-color: #ff4444; background: rgba(255,68,68,0.08); }
  .badge-ig    { color: #e1306c; border-color: #e1306c; background: rgba(225,48,108,0.08); }
  .badge-tt    { color: #69c9d0; border-color: #69c9d0; background: rgba(105,201,208,0.08); }
  .badge-fb    { color: #4267B2; border-color: #4267B2; background: rgba(66,103,178,0.08); }
  .badge-tw    { color: #1da1f2; border-color: #1da1f2; background: rgba(29,161,242,0.08); }
  .badge-other { color: var(--muted); border-color: var(--border); }

  .badge-status-pending  { color: var(--gold);   border-color: var(--gold);   background: rgba(200,164,74,0.1); }
  .badge-status-approved { color: var(--green);  border-color: var(--green);  background: rgba(46,204,113,0.1); }
  .badge-status-rejected { color: var(--red);    border-color: var(--red);    background: rgba(230,57,70,0.1); }

  .views-chip { font-family: 'Orbitron', sans-serif; font-size: 11px; color: var(--gold); }
  .sub-date { font-size: 11px; color: var(--muted); }
  .sub-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

  .link-btn {
    font-family: 'Rajdhani', sans-serif; font-size: 11px; letter-spacing: 1px;
    color: var(--purple2); text-decoration: none; border: 1px solid rgba(123,47,212,0.4);
    padding: 5px 12px; transition: all 0.2s;
  }
  .link-btn:hover { background: rgba(123,47,212,0.12); border-color: var(--purple2); }

  /* ── LEADERBOARD ── */
  .lb-controls { display: flex; gap: 10px; margin-bottom: 18px; align-items: center; flex-wrap: wrap; }

  .week-select {
    background: var(--bg2); border: 1px solid var(--border); color: var(--text);
    font-family: 'Rajdhani', sans-serif; font-size: 12px; letter-spacing: 1px;
    padding: 9px 16px; outline: none; cursor: pointer; transition: all 0.2s;
  }
  .week-select:focus { border-color: var(--purple2); }

  .lb-table { width: 100%; border-collapse: collapse; }
  .lb-table th {
    font-family: 'Rajdhani', sans-serif; font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--muted); text-align: left;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    background: rgba(123,47,212,0.05);
  }
  .lb-table td { padding: 14px 16px; border-bottom: 1px solid rgba(45,31,78,0.5); font-size: 13px; vertical-align: middle; }
  .lb-table tr:hover td { background: rgba(123,47,212,0.05); }

  .rank-crown { font-size: 20px; }
  .rank-num { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; color: var(--muted); }

  .creator-cell { display: flex; flex-direction: column; }
  .creator-cell .handle { font-weight: 600; color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 15px; }
  .creator-cell .platform-tag { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .views-col {
    font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700;
    background: linear-gradient(135deg, var(--gold2), var(--gold));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }

  .change-up   { color: var(--green); font-size: 11px; }
  .change-down { color: var(--red);   font-size: 11px; }
  .change-same { color: var(--muted); font-size: 11px; }

  .bar-cell { width: 140px; }
  .view-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .view-bar-fill { height: 100%; background: linear-gradient(90deg, var(--purple3), var(--purple2), var(--gold)); border-radius: 3px; transition: width 0.8s ease; }

  /* ── MODAL ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }

  .modal {
    background: linear-gradient(135deg, var(--panel), var(--panel2));
    border: 1px solid var(--purple3); border-top: 2px solid var(--purple2);
    padding: 32px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 0 60px rgba(123,47,212,0.3);
    clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
  }

  .modal h3 { font-family: 'Cinzel', serif; font-size: 18px; color: var(--gold2); margin-bottom: 22px; }

  .modal-field { margin-bottom: 16px; }
  .modal-field label { display: block; font-family: 'Rajdhani', sans-serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .modal-field input { width: 100%; background: var(--bg2); border: 1px solid var(--border); color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; padding: 10px 14px; outline: none; transition: all 0.2s; }
  .modal-field input:focus { border-color: var(--purple2); box-shadow: 0 0 10px rgba(123,47,212,0.2); }
  .modal-actions { display: flex; gap: 10px; margin-top: 22px; justify-content: flex-end; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 28px; right: 28px;
    background: linear-gradient(135deg, var(--panel), var(--panel2));
    border: 1px solid var(--purple3); border-left: 3px solid var(--purple2);
    padding: 14px 22px; font-family: 'Rajdhani', sans-serif; font-size: 13px;
    letter-spacing: 1px; color: var(--text); z-index: 200;
    transform: translateX(120%); transition: transform 0.3s;
    box-shadow: 0 4px 20px rgba(123,47,212,0.3);
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
  }
  .toast.show  { transform: translateX(0); }
  .toast.error { border-color: var(--red); border-left-color: var(--red); box-shadow: 0 4px 20px rgba(230,57,70,0.3); }

  /* ── EMPTY ── */
  .empty-state {
    text-align: center; padding: 70px 20px; color: var(--muted);
    font-family: 'Rajdhani', sans-serif; font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 14px; filter: drop-shadow(0 0 10px var(--glow-p)); }

  /* ── SUCCESS ── */
  #success-screen { display: none; text-align: center; padding: 70px 20px; }
  #success-screen .success-icon { font-size: 60px; margin-bottom: 18px; filter: drop-shadow(0 0 15px var(--glow-g)); }
  #success-screen h2 { font-family: 'Cinzel', serif; font-size: 24px; color: var(--gold2); margin-bottom: 12px; }
  #success-screen p  { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }

  /* ── DIVIDER ── */
  .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--purple3), var(--gold), var(--purple3), transparent); margin: 24px 0; }

  @media (max-width: 640px) {
    .form-grid { grid-template-columns: 1fr; }
    .stats-bar.four-col { grid-template-columns: repeat(2,1fr); }
    .submission-card { grid-template-columns: 1fr; }
    .sub-actions { justify-content: flex-start; }
    .bar-cell { display: none; }
    nav button { padding: 10px 16px; font-size: 11px; }
    .role-cards { grid-template-columns: 1fr; }
    }
</style>
